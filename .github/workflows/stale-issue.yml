name: Stale Issue Mark

on:
  schedule:
    - cron: '0 2 * * *'  # 每天早上 10:00
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues
        uses: actions/stale@v9
        with:
          days-before-stale: 30
          days-before-close: -1
          stale-issue-label: status/stale
          stale-issue-message: |
            這個 Issue 超過 30 天沒有更新。
            請更新狀態或回報進度。
          remove-stale-when-updated: true
