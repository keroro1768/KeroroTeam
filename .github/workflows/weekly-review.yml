name: Weekly Review

on:
  schedule:
    - cron: '0 1 * * 1'  # 每周一早上 9:00
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List open tasks
        run: |
          echo "## 📋 Open Tasks" >> $GITHUB_STEP_SUMMARY
          gh issue list --label type/task --state open --json number,title,assignees \
            --jq '.[] | "- #\(.number) \(.title) @\(.assignees[0].login // "unassigned")"' >> $GITHUB_STEP_SUMMARY

      - name: List enhancements
        run: |
          echo "## 🚀 Open Enhancements" >> $GITHUB_STEP_SUMMARY
          gh issue list --label type/enhancement --state open --json number,title,assignees \
            --jq '.[] | "- #\(.number) \(.title)"' >> $GITHUB_STEP_SUMMARY

      - name: List stale issues
        run: |
          echo "## ⚠️ Stale Issues (>30 days)" >> $GITHUB_STEP_SUMMARY
          # 30天未更新的 issues
          gh issue list --state open --search "updated:<$(date -d '30 days ago' '+%Y-%m-%d')" --json number,title,updatedAt \
            --jq '.[] | "- #\(.number) \(.title) (updated: \(.updatedAt))"' >> $GITHUB_STEP_SUMMARY
